<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clickable Image Card</title>

<style>
body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.card {
    width: 300px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    display: block;
}

.title {
    padding: 10px;
    text-align: center;
    background: white;
    font-weight: bold;
}
</style>
</head>

<body>

<a href="https://whatsapps-chats.blogspot.com/2026/04/my-whatsapp-number-for-video-call.html" target="_blank">
    <div class="card">
        <img src="https://via.placeholder.com/300x200.png?text=Click+Here" alt="Clickable Image">
        <div class="title">Click Here</div>
    </div>
</a>

</body>
</html>
